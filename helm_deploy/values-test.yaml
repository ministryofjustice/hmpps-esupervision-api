---
# Per environment values which override defaults in hmpps-esupervision-api/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: esupervision-api-test.hmpps.service.justice.gov.uk
    annotations:
      nginx.ingress.kubernetes.io/limit-rps: "50"
      nginx.ingress.kubernetes.io/limit-rpm: "2500"
      nginx.ingress.kubernetes.io/limit-burst: "50"

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.dev.json"
    HMPPS_AUTH_URL: "https://sign-in-dev.hmpps.service.justice.gov.uk/auth"
    HOSTED_AT: "https://esupervision-test.hmpps.service.justice.gov.uk"
    API_BASE_URL: "https://esupervision-api-test.hmpps.service.justice.gov.uk"
    MANAGE_USERS_API: "https://manage-users-api-dev.hmpps.service.justice.gov.uk/"
    MPOP_URL: "https://manage-people-on-probation-test.hmpps.service.justice.gov.uk"
    POP_UI_URL: "https://probation-check-in-test.hmpps.service.justice.gov.uk"
    APP_ENV: "TEST"
    APP_SCHEDULING_MIGRATION_EVENT_REPLAY_CRON: "0 * * * * *"
    APP_SCHEDULING_V2_CHECKIN_CREATION_CRON: "0 5 9,11,12,13,14 * * *"
    APP_FEATURES_ESUP_1239: "true"
    APP_FEATURES_ESUP_1763: "true"
    SPRING_PROFILES_ACTIVE: "stubrekog,stubndilius"
    LOADTEST_STUB_LATENCY_ENABLED: "true"
    LOADTEST_STUB_LATENCY_NDILIUS_VALIDATE_MEAN_MS: "250"
    LOADTEST_STUB_LATENCY_NDILIUS_VALIDATE_JITTER_MS: "120"
    LOADTEST_STUB_LATENCY_NDILIUS_CONTACT_MEAN_MS: "250"
    LOADTEST_STUB_LATENCY_NDILIUS_CONTACT_JITTER_MS: "120"
    LOADTEST_STUB_LATENCY_REKOG_CREATE_SESSION_MEAN_MS: "200"
    LOADTEST_STUB_LATENCY_REKOG_CREATE_SESSION_JITTER_MS: "80"
    LOADTEST_STUB_LATENCY_REKOG_SESSION_RESULTS_MEAN_MS: "400"
    LOADTEST_STUB_LATENCY_REKOG_SESSION_RESULTS_JITTER_MS: "150"
    LOADTEST_STUB_LATENCY_REKOG_COMPARE_FACES_MEAN_MS: "350"
    LOADTEST_STUB_LATENCY_REKOG_COMPARE_FACES_JITTER_MS: "150"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: hmpps_esupervision_alerts_nonprod
