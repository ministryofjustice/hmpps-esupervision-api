rekognition:
  face-similarity:
    # minimum accepted value that qualifies a "match"
    threshold: 90.0
  liveness:
    # minimum confidence score for liveness detection to pass
    confidence-threshold: ${REKOG_LIVENESS_CONFIDENCE_THRESHOLD:70.0}
    # Face Liveness is not available in eu-west-2, so we use eu-west-1
    region: ${REKOG_LIVENESS_REGION:eu-west-1}
  region: ${REKOG_AWS_REGION}
  role_arn: ${REKOG_ROLE_ARN}
  role_session_name: ${REKOG_ROLE_SESSION_NAME}
  max-concurrency: 10
  read-timeout-seconds: 20
  # Upper bound on how long we will wait for an async Rekognition call to complete
  # before treating it as timed out. Slightly above read-timeout-seconds to allow
  # the SDK's own read timeout to fire first.
  call-timeout-seconds: 30

resilience4j:
  circuitbreaker:
    instances:
      ndiliusApi:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 60s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        record-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - org.springframework.web.reactive.function.client.WebClientResponseException.InternalServerError
          - org.springframework.web.reactive.function.client.WebClientResponseException.BadGateway
          - org.springframework.web.reactive.function.client.WebClientResponseException.ServiceUnavailable
          - org.springframework.web.reactive.function.client.WebClientResponseException.GatewayTimeout
        ignore-exceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException.BadRequest
          - org.springframework.web.reactive.function.client.WebClientResponseException.NotFound
          - org.springframework.web.reactive.function.client.WebClientResponseException.Unauthorized
          - org.springframework.web.reactive.function.client.WebClientResponseException.Forbidden

      govNotify:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 60s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
        record-exceptions:
          - uk.gov.service.notify.NotificationClientException

      awsS3:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 70
        slow-call-rate-threshold: 90
        slow-call-duration-threshold: 10s
        record-exceptions:
          - software.amazon.awssdk.core.exception.SdkException
          - software.amazon.awssdk.services.s3.model.S3Exception

      awsRekognition:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 70
        slow-call-rate-threshold: 90
        slow-call-duration-threshold: 8s
        record-exceptions:
          - software.amazon.awssdk.services.rekognition.model.RekognitionException
        ignore-exceptions:
          - software.amazon.awssdk.services.rekognition.model.InvalidParameterException

  retry:
    instances:
      ndiliusApi:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - org.springframework.web.reactive.function.client.WebClientResponseException.InternalServerError
          - org.springframework.web.reactive.function.client.WebClientResponseException.BadGateway
          - org.springframework.web.reactive.function.client.WebClientResponseException.ServiceUnavailable
          - org.springframework.web.reactive.function.client.WebClientResponseException.GatewayTimeout
        ignore-exceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException.BadRequest
          - org.springframework.web.reactive.function.client.WebClientResponseException.NotFound
          - org.springframework.web.reactive.function.client.WebClientResponseException.Unauthorized
          - org.springframework.web.reactive.function.client.WebClientResponseException.Forbidden

      govNotify:
        max-attempts: 3
        wait-duration: 1000ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - uk.gov.service.notify.NotificationClientException

      awsS3:
        max-attempts: 2
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - software.amazon.awssdk.core.exception.SdkException
          - software.amazon.awssdk.services.s3.model.S3Exception

      awsRekognition:
        max-attempts: 2
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - software.amazon.awssdk.services.rekognition.model.RekognitionException
        ignore-exceptions:
          - software.amazon.awssdk.services.rekognition.model.InvalidParameterException

  timelimiter:
    instances:
      ndiliusApi:
        timeout-duration: 5s
        cancel-running-future: true

      govNotify:
        timeout-duration: 10s
        cancel-running-future: true

      awsS3:
        timeout-duration: 15s
        cancel-running-future: true

      awsRekognition:
        timeout-duration: 30s
        cancel-running-future: true
