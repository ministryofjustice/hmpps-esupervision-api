info.app:
  name: HMPPS E-Supervision
  version: 1.0

api:
  base:
    url:
      manage-users-api: ${MANAGE_USERS_API}
      ndilius-api: ${NDILIUS_API_URL:https://esupervision-and-delius-dev.hmpps.service.justice.gov.uk}
      tier-api: ${TIER_API_URL:https://hmpps-tier-dev.hmpps.service.justice.gov.uk}
      arns-api: ${ARNS_API_URL:https://assess-risks-and-needs-dev.hmpps.service.justice.gov.uk}

app:
  env: ${APP_ENV}
  hostedAt: ${HOSTED_AT}
  mpopUrl: ${MPOP_URL}
  checkinUrl: ${POP_UI_URL}
  apiBaseUrl: ${API_BASE_URL}
  # how long should the presigned S3 URLs be valid for?
  upload-ttl-minutes: 10
  scheduling:
    checkin-notification:
      # How long, starting from dueDate, do we accept checkin submissions.
      # Afterward the checkin's status is updated to EXPIRED.
      window: 72h
    v2-checkin-creation:
      cron: "0 0 9 * * *"  # Every day at 9 AM (matches V1 timing)
      # we process offender records in chunks
      chunk-size: 100
    v2-checkin-reminder:
      cron: "0 0 9 * * *"  # Same time as initial checkin notification
      chunk-size: 100
    v2-practitioner-custom-questions-reminder:
      cron: "0 15 8 * * *"
      enabled: true
    v2-checkin-expiry:
      cron: "0 15 9 * * *"  # Every day at 9:15 AM (matches V1 timing)
      grace-period-days: 3
    monthly-stats-refresh:
      cron: "0 0 1 * * *"  # Every day at 1:00 AM
    migration-event-replay:
      cron: ${MIGRATION_EVENT_REPLAY_CRON:0 */30 * * * *}
      batch-size: 50
    # One-off cleanup of legacy checkin S3 assets (ESUP-1770 + pre-liveness videos).
    # Disabled by default. Enable per env, observe with dry-run=true, flip dry-run off,
    # then disable again.
    checkin-legacy-cleanup:
      enabled: ${CHECKIN_LEGACY_CLEANUP_ENABLED:false}
      dry-run: ${CHECKIN_LEGACY_CLEANUP_DRY_RUN:true}
      cron: ${CHECKIN_LEGACY_CLEANUP_CRON:0 20 */6 * * *}
  features:
    # publish media proxy links to NDelius
    esup-1239: true
    # bind presigned upload URLs to the SHA-256 of the file content.
    # When a client supplies a hash the API always signs it into the URL and echoes
    # x-amz-checksum-sha256 in requiredHeaders. The flag below controls whether a hash is mandatory.
    upload-content-hash:
      # if true, reject upload_location requests that don't carry a hash
      require: ${UPLOAD_CONTENT_HASH_REQUIRE:false}
    # remove the checkin snapshot if the manual id check confirms it is a match without concern
    esup-1763: ${APP_FEATURES_ESUP_1763:false}
  offender-survey:
    # expand form values into human-readable strings in NDelius notes
    expansions:
      YES: "Yes"
      NO: "No"
      EMPLOYMENT_EDU: "Employment and education"
      SUPPORT_SYSTEM: "Relationships (family, friends, partner)"
      NO_HELP: "No, I do not need any support"
      OTHER: "Something else"
    custom-labels:
      mentalHealth: "How they have been feeling"
      mentalHealthComment: "What they want us to know about how they have been feeling"
      assistance: "Anything they need support with or to let us know"
      mentalHealthSupport: "What they want us to know about mental health"
      alcoholSupport: "What they want us to know about alcohol"
      drugsSupport: "What they want us to know about drugs"
      moneySupport: "What they want us to know about money"
      housingSupport: "What they want us to know about housing"
      employmentEduSupport: "What they want us to know about employment and education"
      supportSystemSupport: "What they want us to know about their relationships"
      otherSupport: "What they want us to know about (something else)"
      callback: "If they need us to contact them before their next appointment"
      callbackDetails: "What they want to talk about"

spring:
  application:
    name: esupervision-api
  codec:
    max-in-memory-size: 10MB
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500, expireAfterWrite=6h

  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${hmpps-auth.url}/.well-known/jwks.json

      client:
        provider:
          hmpps-auth:
            token-uri: ${hmpps-auth.url}/oauth/token

        registration:
          manage-users-api:
            provider: hmpps-auth
            client-id: ${API_CLIENT_ID}
            client-secret: ${API_CLIENT_SECRET}
            authorization-grant-type: client_credentials
            scope: read

          ndilius-api:
            provider: hmpps-auth
            client-id: ${API_CLIENT_ID}
            client-secret: ${API_CLIENT_SECRET}
            authorization-grant-type: client_credentials
            scope: read

          tier-api:
            provider: hmpps-auth
            client-id: ${API_CLIENT_ID}
            client-secret: ${API_CLIENT_SECRET}
            authorization-grant-type: client_credentials
            scope: read

          arns-api:
            provider: hmpps-auth
            client-id: ${API_CLIENT_ID}
            client-secret: ${API_CLIENT_SECRET}
            authorization-grant-type: client_credentials
            scope: read

  datasource:
    url: jdbc:postgresql://${POSTGRES_ENDPOINT}/${POSTGRES_DATABASE}?stringtype=unspecified
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 60000
      connection-timeout: 30000
      pool-name: HikariPool-esupervision

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  jpa:
    open-in-view: true
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        type:
          preferred_duration_jdbc_type: INTERVAL_SECOND

server:
  port: 8080
  servlet:
    context-path: /
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: 10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.1[6-9]{1}\.\d{1,3}\.\d{1,3}|172\.2[0-9]{1}\.\d{1,3}\.\d{1,3}|172\.3[0-1]{1}\.\d{1,3}\.\d{1,3}|0:0:0:0:0:0:0:1|::1|100\.6[4-9]\.\d{1,3}\.\d{1,3}|100\.[7-9][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.1[0-1][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.12[0-7]\.\d{1,3}\.\d{1,3}
  shutdown: graceful
  error:
    include-message: always

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: 'info, health'
  endpoint:
    health:
      cache:
        time-to-live: 2000ms
      show-components: always
      show-details: always
      probes:
        enabled: true
    info:
      cache:
        time-to-live: 2000ms

aws:
  region-name: eu-west-2
  s3:
    image-uploads: ${S3_DATA_BUCKET_NAME}
    video-uploads: ${S3_DATA_BUCKET_NAME}

