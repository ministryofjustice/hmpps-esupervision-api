name: DEBUG slack delivery
# TEMPORARY diagnostic — delete once Slack alerting is confirmed working.
# Posts a test message to the security alerts channel and prints Slack's raw
# API response, so we can see the real error (the security scans hide it via errors:false).
on:
  # push trigger so it runs on the feature branch without needing to be on main
  push:
    branches:
      - ESUP-1978/fix-owasp-scan-failure
    paths:
      - .github/workflows/debug_slack.yml
  workflow_dispatch:

jobs:
  debug-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Post test message and show Slack response
        env:
          # The reusable security_owasp.yml feeds the Slack action's SLACK_BOT_TOKEN
          # env from secrets.HMPPS_SRE_SLACK_BOT_TOKEN — so that's the real secret name.
          SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SRE_SLACK_BOT_TOKEN }}
          CHANNEL_ID: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID }}
        run: |
          if [ -z "${SLACK_BOT_TOKEN}" ]; then
            echo "::error::HMPPS_SRE_SLACK_BOT_TOKEN is empty — the secret is not available to this repo."
          fi
          echo "Target channel id (from repo variable): '${CHANNEL_ID}'"
          echo "--- Slack chat.postMessage response ---"
          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-type: application/json; charset=utf-8" \
            -d "{\"channel\":\"${CHANNEL_ID}\",\"text\":\":wrench: esupervision-api Slack delivery test\"}"
          echo
          echo "--- bot identity (auth.test) ---"
          curl -sS -X POST https://slack.com/api/auth.test \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}"
          echo
